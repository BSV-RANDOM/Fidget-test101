<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Fidget Box</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-color: #2b2b36;
            color: white;
            font-family: sans-serif;
            margin: 0;
        }
        #fidget-box {
            width: 150px;
            height: 150px;
            background-color: #61dafb;
            border-radius: 10px;
            margin-bottom: 40px;
            transition: all 0.4s ease;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }
        .glowing {
            box-shadow: 0 0 40px 15px rgba(255, 255, 255, 0.8) !important;
        }
        .button-container {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
            max-width: 350px;
        }
        button {
            padding: 12px 20px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 8px;
            border: none;
            background: #ffffff;
            color: #333;
            transition: transform 0.1s;
        }
        button:active {
            transform: scale(0.90);
        }
    </style>
</head>
<body>

    <h1>Fidget Box</h1>
    <div id="fidget-box"></div>
    
    <div class="button-container">
        <button onclick="spinLeft()">Spin Left</button>
        <button onclick="spinRight()">Spin Right</button>
        <button onclick="changeColor()">Change Color</button>
        <button onclick="toggleShape()">Square / Circle</button>
        <button onclick="changeSize()">Change Size</button>
        <button onclick="pulseGlow()">Glow!</button>
    </div>

    <script>
        const box = document.getElementById('fidget-box');
        
        let targetRotation = 0;
        let spinTimer = null;
        let currentDirection = 0; // 0 = idle, -1 = left, 1 = right
        let hasQueuedSpin = false;

        function spinLeft() {
            if (currentDirection === 0) {
                // Box is idle, spin left
                executeSpin(-1);
            } else if (currentDirection === -1) {
                // Already spinning left, queue up one more spin
                hasQueuedSpin = true;
            } else if (currentDirection === 1) {
                // Spinning right, cancel queue and reverse immediately
                hasQueuedSpin = false;
                executeSpin(-1);
            }
        }

        function spinRight() {
            if (currentDirection === 0) {
                // Box is idle, spin right
                executeSpin(1);
            } else if (currentDirection === 1) {
                // Already spinning right, queue up one more spin
                hasQueuedSpin = true;
            } else if (currentDirection === -1) {
                // Spinning left, cancel queue and reverse immediately
                hasQueuedSpin = false;
                executeSpin(1);
            }
        }

        function executeSpin(direction) {
            targetRotation += direction * 90;
            box.style.transform = `rotate(${targetRotation}deg)`;
            currentDirection = direction;
            
            // Clear the timer if we are interrupting a current spin
            clearTimeout(spinTimer);
            
            // Set a new timer for the 400ms transition
            spinTimer = setTimeout(() => {
                if (hasQueuedSpin) {
                    hasQueuedSpin = false;
                    executeSpin(currentDirection); // Fire the queued spin
                } else {
                    currentDirection = 0; // Go back to idle
                }
            }, 400); 
        }

        function changeColor() {
            const colors = ['#61dafb', '#ff6b6b', '#4ecdc4', '#ffe66d', '#c7f464', '#ff9ff3'];
            const randomColor = colors[Math.floor(Math.random() * colors.length)];
            box.style.backgroundColor = randomColor;
        }

        function toggleShape() {
            if (box.style.borderRadius === '50%') {
                box.style.borderRadius = '10px';
            } else {
                box.style.borderRadius = '50%';
            }
        }

        function changeSize() {
            const newSize = Math.floor(Math.random() * 120) + 100;
            box.style.width = `${newSize}px`;
            box.style.height = `${newSize}px`;
        }

        function pulseGlow() {
            box.classList.add('glowing');
            setTimeout(() => { box.classList.remove('glowing'); }, 400);
        }
    </script>

</body>
</html>
